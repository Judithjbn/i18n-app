
<select class="flex mt-4 justify-center items-center w-20 h-12 border border-b-cyan-500 rounded-md cursor-pointer font-bold text-lg bg-cyan-50 text-cyan-600"  [value]="currentLang()" (change)="changeLanguage($event)">
    @for ( language of languages(); track language.code ) {
        <option [value]="language.code"> {{language.flag}} {{language.code}} </option>
    }
</select>
