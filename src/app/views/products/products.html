<!-- component -->
<section class="flex justify-center items-center flex-col gap-4">
    <app-lenguage-selector></app-lenguage-selector>
    <app-name-form (nameChange)="fullName.set($event)"></app-name-form>
</section>
<section class="p-4">
  <div class="relative bg-clip-border text-gray-700 flex h-full min-h-[314px] w-full flex-col items-center justify-center rounded-xl bg-gray-900 px-8">
    <div class="container mx-auto text-center">
      <h2 class="block antialiased tracking-normal font-sans text-4xl font-semibold leading-[1.3] text-white mb-4">{{"pricingPage.title" | translate}}</h2>
      <p class="block antialiased font-sans text-xl font-normal leading-relaxed text-white mb-8 opacity-70">{{"welcomeMessage" | translate : { firstName: fullName() } }}</p>
    </div>
  </div>
  <div class="px-10 pt-8 pb-16 -mt-16 lg:px-30 xl:px-40">
    <div class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
      @for (plan of plans; track plan.id) {
        <app-product-card
          [featured]="plan.id === 'basic'"
          [priceKey]="plan.priceKey"
          [featureKeys]="plan.featureKeys"
        >
          <h5
            card-title
            class="antialiased tracking-normal font-sans text-xl font-semibold leading-snug text-blue-500 flex justify-center mt-2 mb-2"
          >
            {{ plan.nameKey | translate }}
          </h5>
          @if (plan.cta; as cta) {
            <ng-container card-actions>
              <button
                class="align-middle select-none font-sans font-bold text-center uppercase transition-all disabled:opacity-50 disabled:shadow-none disabled:pointer-events-none text-xs py-3 px-6 rounded-lg bg-gray-900 text-white shadow-md shadow-gray-900/10 hover:shadow-lg hover:shadow-gray-900/20 focus:opacity-[0.85] focus:shadow-none active:opacity-[0.85] active:shadow-none w-full flex items-center justify-center gap-4"
                type="button"
                [routerLink]="cta.routerLink"
              >
                {{ cta.labelKey | translate }}
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2"
                  stroke="currentColor"
                  aria-hidden="true"
                  class="w-5 h-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
                  ></path>
                </svg>
              </button>
            </ng-container>
          }
        </app-product-card>
      }
    </div>
  </div>
</section>
